<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevAntra ERP Dashboard</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- ═══ INLINE SVG SPRITE ═══ -->
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
  <defs>
    <symbol id="ic-home" viewBox="0 0 24 24"><path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1H15v-7H9v7H4a1 1 0 0 1-1-1V10.5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
    <symbol id="ic-users" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M23 21v-2a4 4 0 0 0-3-3.87" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M16 3.13a4 4 0 0 1 0 7.75" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="ic-calendar" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2"/></symbol>
    <symbol id="ic-folder" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
    <symbol id="ic-bell" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.73 21a2 2 0 0 1-3.46 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="ic-inbox" viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></symbol>
    <symbol id="ic-bar-chart" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="12" y1="20" x2="12" y2="4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="6" y1="20" x2="6" y2="14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></symbol>
    <symbol id="ic-settings" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="ic-help" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="17" x2="12.01" y2="17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></symbol>
    <symbol id="ic-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="ic-chevron-down" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  </defs>
  </svg>

  <!-- Overlay for mobile sidebar -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Main Wrapper (flex container for sidebar + content) -->
  <div class="main-wrapper" id="mainWrapper">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

    <!-- Top Header -->
    <header class="top-header">
      <div class="header-brand">
        <button class="hamburger" id="hamburger">&#9776;</button>
        <div class="logo-brand header-logo">
         <img src="Black_bg_devantra_logo.png" alt="DevAntra" class="devantralogo">
        </div>
        <span class="header-sep">|</span>
        <span class="header-admin">Admin</span>
      </div>
      <div class="header-right">
        <button class="icon-btn" aria-label="Search">
          <svg class="ib" width="18" height="18"><use href="#ic-search"/></svg>
        </button>
        <button class="icon-btn" aria-label="Settings">
          <svg class="ib" width="18" height="18"><use href="#ic-settings"/></svg>
        </button>
        <div class="header-profile">
          <div class="avatar">RK</div>
          <div class="profile-info">
            <span class="profile-name">Rohan Kapoor</span>
            <span class="profile-role">Admin</span>
          </div>
          <svg class="ib" width="14" height="14"><use href="#ic-chevron-down"/></svg>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content">

      <!-- Welcome Bar -->
      <div class="welcome-bar">
        <div class="welcome-left">
          <h1 class="welcome-title" id="welcomeTitle"></h1>
          <p class="welcome-sub" id="welcomeSub"></p>
        </div>
        <button class="btn-primary" id="createMemberBtn"></button>
      </div>

      <!-- Stats Row -->
      <div class="stats-row" id="statsRow"></div>

      <!-- Action Buttons -->
      <div class="action-buttons" id="actionButtons"></div>

      <!-- Content Grid -->
      <div class="content-grid">

        <!-- Left Column -->
        <div class="col col-left">
          <div class="card">
            <div class="card-header">
              <span class="card-title">New Member Requests</span>
              <button class="dots-btn">•••</button>
            </div>
            <div id="newMemberRequestsList"></div>
          </div>

          <div class="card">
            <div class="card-header">
              <span class="card-title">New Member Requests</span>
              <a href="#" class="card-link">View All &rsaquo;</a>
            </div>
            <div id="requestSummaryList"></div>
          </div>

          <div class="card">
            <div class="card-header">
              <span class="card-title">Pending Requests</span>
              <a href="#" class="card-link">View All Requests &rsaquo;</a>
            </div>
            <div id="pendingRequestsList"></div>
          </div>
        </div>

        <!-- Middle Column -->
        <div class="col col-mid">
          <div class="card">
            <div class="card-header">
              <span class="card-title">Recent Activities</span>
              <button class="icon-btn-sm">&#x21bb;</button>
            </div>
            <div id="recentActivitiesContent"></div>
          </div>

          <div class="card">
            <div class="card-header">
              <span class="card-title">Active Tasks</span>
              <div class="hdr-actions">
                <button class="icon-btn-sm">&#9776;</button>
                <button class="icon-btn-sm">&#x21c4;</button>
              </div>
            </div>
            <div id="activeTasksContent"></div>
          </div>
        </div>

        <!-- Right Column -->
        <div class="col col-right">
          <div class="card">
            <div class="card-header">
              <span class="card-title">Member Directory Summary</span>
              <button class="icon-btn-sm">&#x2261;</button>
            </div>
            <div id="memberDirectoryContent"></div>
          </div>

          <div class="card">
            <div class="card-header">
              <span class="card-title">Announcements</span>
              <div class="hdr-actions">
                <button class="icon-btn-sm">&#9733;</button>
                <button class="icon-btn-sm">&#x2261;</button>
              </div>
            </div>
            <div id="announcementsContent"></div>
            <div class="card-footer">
              <a href="#" class="card-link">View All &rsaquo;</a>
            </div>
          </div>
        </div>

      </div><!-- /content-grid -->
    </main>

  <!-- ═══ MODALS ═══ -->

  <!-- Create New Member Modal -->
  <div class="modal-overlay" id="createMemberModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Create New Member</h2>
        <button class="close-modal" onclick="closeModal('createMemberModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="cmFullName" placeholder="Enter full name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="cmEmail" placeholder="Enter email">
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="cmRole">
            <option value="Intern">Intern</option>
            <option value="Employee">Employee</option>
            <option value="HR">HR</option>
            <option value="Student">Student</option>
            <option value="Manager">Manager</option>
          </select>
        </div>
        <div class="form-group">
          <label>Department</label>
          <select id="cmDept">
            <option value="Development">Development</option>
            <option value="Design">Design</option>
            <option value="HR">Human Resources</option>
            <option value="Marketing">Marketing</option>
            <option value="Operations">Operations</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal('createMemberModal')">Cancel</button>
        <button class="btn-primary" onclick="submitCreateMember()">Create Member</button>
      </div>
    </div>
  </div>

  <!-- Add Task Modal -->
  <div class="modal-overlay" id="addTaskModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Add New Task</h2>
        <button class="close-modal" onclick="closeModal('addTaskModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Task Title</label>
          <input type="text" id="atTitle" placeholder="Enter task title">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="atDesc" rows="3" placeholder="Describe the task..."></textarea>
        </div>
        <div class="form-group">
          <label>Assign To</label>
          <input type="text" id="atAssignee" placeholder="Member name">
        </div>
        <div class="form-row">
          <div class="form-group" style="flex:1">
            <label>Priority</label>
            <select id="atPriority">
              <option value="High">High</option>
              <option value="Medium" selected>Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>
          <div class="form-group" style="flex:1">
            <label>Due Date</label>
            <input type="date" id="atDue">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal('addTaskModal')">Cancel</button>
        <button class="btn-primary" onclick="submitAddTask()">Create Task</button>
      </div>
    </div>
  </div>

  <!-- Post Announcement Modal -->
  <div class="modal-overlay" id="announcementModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Post Announcement</h2>
        <button class="close-modal" onclick="closeModal('announcementModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="annTitle" placeholder="Announcement title">
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select id="annPriority">
            <option value="High">High</option>
            <option value="Medium" selected>Medium</option>
            <option value="Low">Low</option>
          </select>
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea id="annMessage" rows="4" placeholder="Type your announcement..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal('announcementModal')">Cancel</button>
        <button class="btn-primary" onclick="submitAnnouncement()">Post Announcement</button>
      </div>
    </div>
  </div>

  <!-- Generate Report Modal -->
  <div class="modal-overlay" id="reportModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Generate Report</h2>
        <button class="close-modal" onclick="closeModal('reportModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Report Type</label>
          <select id="rptType">
            <option value="Attendance">Attendance Report</option>
            <option value="Task">Task Progress Report</option>
            <option value="Member">Member Activity Report</option>
            <option value="Performance">Performance Report</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group" style="flex:1">
            <label>From</label>
            <input type="date" id="rptFrom">
          </div>
          <div class="form-group" style="flex:1">
            <label>To</label>
            <input type="date" id="rptTo">
          </div>
        </div>
        <div class="form-group">
          <label>Format</label>
          <select id="rptFormat">
            <option value="PDF">PDF</option>
            <option value="Excel">Excel</option>
            <option value="CSV">CSV</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal('reportModal')">Cancel</button>
        <button class="btn-primary" onclick="submitReport()">Generate</button>
      </div>
    </div>
  </div>

  <!-- Task Detail Modal -->
  <div class="modal-overlay" id="taskDetailModal">
    <div class="modal-content modal-lg">
      <div class="modal-header">
        <h2 id="tdTitle">Task Details</h2>
        <button class="close-modal" onclick="closeModal('taskDetailModal')">&times;</button>
      </div>
      <div class="modal-body" id="tdBody"></div>
      <div class="modal-footer" id="tdFooter"></div>
    </div>
  </div>

  <!-- Member Detail Modal -->
  <div class="modal-overlay" id="memberDetailModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="mdTitle">Member Details</h2>
        <button class="close-modal" onclick="closeModal('memberDetailModal')">&times;</button>
      </div>
      <div class="modal-body" id="mdBody"></div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal('memberDetailModal')">Close</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer"></div>

  <script src="script.js"></script>
</body>
</html>
