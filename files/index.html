<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevAntra ERP Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- Overlay for mobile sidebar -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-brand">
        <span class="logo-box">5</span><span class="logo-dev">DEV</span><span class="logo-antra">ANTRA</span>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <!-- Main Wrapper -->
  <div class="main-wrapper" id="mainWrapper">

    <!-- Top Header -->
    <header class="top-header">
      <div class="header-brand">
        <button class="hamburger" id="hamburger">&#9776;</button>
        <div class="logo-brand header-logo">
         <img src="Devantra.png" class="devantralogo">
        </div>
        <span class="header-sep">|</span>
        <span class="header-admin">Admin</span>
      </div>
      <div class="header-right">
        <button class="icon-btn" aria-label="Search">
          <svg width="18" height="18" fill="none" stroke="#475569" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <button class="icon-btn" aria-label="Settings">
          <svg width="18" height="18" fill="none" stroke="#475569" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <div class="header-profile">
          <div class="avatar">RK</div>
          <div class="profile-info">
            <span class="profile-name">Rohan Kapoor</span>
            <span class="profile-role">Admin</span>
          </div>
          <svg width="14" height="14" fill="none" stroke="#475569" stroke-width="2" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content">

      <!-- Welcome Bar -->
      <div class="welcome-bar">
        <div class="welcome-left">
          <h1 class="welcome-title" id="welcomeTitle"></h1>
          <p class="welcome-sub" id="welcomeSub"></p>
        </div>
        <button class="btn-primary" id="createMemberBtn"></button>
      </div>

      <!-- Stats Row -->
      <div class="stats-row" id="statsRow"></div>

      <!-- Action Buttons -->
      <div class="action-buttons" id="actionButtons"></div>

      <!-- Content Grid -->
      <div class="content-grid">

        <!-- Left Column -->
        <div class="col col-left">
          <div class="card">
            <div class="card-header">
              <span class="card-title">New Member Requests</span>
              <button class="dots-btn">•••</button>
            </div>
            <div id="newMemberRequestsList"></div>
          </div>

          <div class="card">
            <div class="card-header">
              <span class="card-title">New Member Requests</span>
              <a href="#" class="card-link">View All &rsaquo;</a>
            </div>
            <div id="requestSummaryList"></div>
          </div>

          <div class="card">
            <div class="card-header">
              <span class="card-title">Pending Requests</span>
              <a href="#" class="card-link">View All Requests &rsaquo;</a>
            </div>
            <div id="pendingRequestsList"></div>
          </div>
        </div>

        <!-- Middle Column -->
        <div class="col col-mid">
          <div class="card">
            <div class="card-header">
              <span class="card-title">Recent Activities</span>
              <button class="icon-btn-sm">&#x21bb;</button>
            </div>
            <div id="recentActivitiesContent"></div>
          </div>

          <div class="card">
            <div class="card-header">
              <span class="card-title">Active Tasks</span>
              <div class="hdr-actions">
                <button class="icon-btn-sm">&#9776;</button>
                <button class="icon-btn-sm">&#x21c4;</button>
              </div>
            </div>
            <div id="activeTasksContent"></div>
          </div>
        </div>

        <!-- Right Column -->
        <div class="col col-right">
          <div class="card">
            <div class="card-header">
              <span class="card-title">Member Directory Summary</span>
              <button class="icon-btn-sm">&#x2261;</button>
            </div>
            <div id="memberDirectoryContent"></div>
          </div>

          <div class="card">
            <div class="card-header">
              <span class="card-title">Announcements</span>
              <div class="hdr-actions">
                <button class="icon-btn-sm">&#9733;</button>
                <button class="icon-btn-sm">&#x2261;</button>
              </div>
            </div>
            <div id="announcementsContent"></div>
            <div class="card-footer">
              <a href="#" class="card-link">View All &rsaquo;</a>
            </div>
          </div>
        </div>

      </div><!-- /content-grid -->
    </main>
  </div><!-- /main-wrapper -->

  <script src="script.js"></script>
</body>
</html>
